name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  e2e-all-backends:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
      - run: npm ci
      # Elasticsearch exits on Linux if this is too low (common CI failure).
      - name: Tune kernel for Elasticsearch
        run: sudo sysctl -w vm.max_map_count=262144
      - name: Start databases
        run: docker compose up -d
      # Longer than local default: Neo4j + ES cold start on a shared runner.
      - name: Full e2e (wait + all adapters)
        run: npm run wait-for-services:ci && npm run test:e2e:ci
      - name: Stop databases
        if: always()
        run: docker compose down -v
